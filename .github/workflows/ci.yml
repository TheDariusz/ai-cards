name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    name: Test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      # wrangler types reads var/secret KEYS from .dev.vars to type `Env`;
      # placeholder values are enough for typecheck + tests (no real calls).
      - run: cp .dev.vars.example .dev.vars
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: test
    # Manual gate: never deploys on push/PR — only when you click "Run workflow"
    # in the Actions tab (workflow_dispatch). Tests above still run on every push/PR.
    if: github.event_name == 'workflow_dispatch'
    concurrency: deploy-production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm
      # Only for `wrangler types` during build; deploy uses the worker's real
      # secrets (set via `wrangler secret put`), never this file.
      - run: cp .dev.vars.example .dev.vars
      - run: npm ci
      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply ai-cards --remote
      - name: Build & deploy
        run: npm run deploy
